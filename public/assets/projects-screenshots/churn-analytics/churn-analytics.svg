<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111C34"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5C7"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- grid texture -->
  <g stroke="#1E293B" stroke-width="1">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="337" x2="800" y2="337"/>
  </g>

  <!-- eyebrow -->
  <text x="56" y="70" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#00E5C7" letter-spacing="3">DATA ANALYTICS</text>

  <!-- bar chart, declining bars = churn -->
  <g>
    <rect x="120" y="230" width="52" height="140" rx="4" fill="url(#barGrad)"/>
    <rect x="200" y="260" width="52" height="110" rx="4" fill="url(#barGrad)" opacity="0.85"/>
    <rect x="280" y="300" width="52" height="70" rx="4" fill="url(#barGrad)" opacity="0.65"/>
    <rect x="360" y="330" width="52" height="40" rx="4" fill="#EF4444" opacity="0.85"/>
  </g>

  <!-- declining trend line -->
  <polyline points="146,220 226,250 306,290 386,320" fill="none" stroke="#F1F5F9" stroke-width="2.5" stroke-dasharray="6 5" opacity="0.7"/>
  <circle cx="386" cy="320" r="5" fill="#EF4444"/>

  <!-- callout -->
  <text x="470" y="240" font-family="ui-monospace, Menlo, monospace" font-size="46" font-weight="700" fill="#F1F5F9">28%</text>
  <text x="470" y="266" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#94A3B8" letter-spacing="1">OVERALL CHURN</text>

  <text x="470" y="310" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#00E5C7">Power BI · Python · SQL</text>

  <!-- title -->
  <text x="56" y="410" font-family="ui-sans-serif, Inter, sans-serif" font-size="26" font-weight="600" fill="#F1F5F9">Customer Churn &amp; Retention Analytics</text>
</svg>
