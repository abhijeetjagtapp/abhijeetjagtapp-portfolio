<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111C34"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad4)"/>

  <text x="56" y="70" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#00E5C7" letter-spacing="3">COMPUTER VISION · OPENCV</text>

  <!-- scan frame -->
  <rect x="120" y="110" width="560" height="240" rx="8" fill="#0B1220" stroke="#1E293B" stroke-width="1.5"/>

  <!-- tracked ball -->
  <circle cx="330" cy="230" r="34" fill="url(#ballGrad)"/>

  <!-- detection bounding box + corner brackets -->
  <g stroke="#00E5C7" stroke-width="3" fill="none">
    <path d="M270 178 h-14 a8 8 0 0 0 -8 8 v14"/>
    <path d="M390 178 h14 a8 8 0 0 1 8 8 v14"/>
    <path d="M270 282 h-14 a8 8 0 0 1 -8 -8 v-14"/>
    <path d="M390 282 h14 a8 8 0 0 0 8 -8 v-14"/>
  </g>

  <!-- confidence label -->
  <rect x="266" y="150" width="128" height="24" rx="4" fill="#00B8D4"/>
  <text x="330" y="167" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#0F172A">ball 0.94</text>

  <!-- trajectory dots -->
  <g fill="#00E5C7" opacity="0.7">
    <circle cx="460" cy="200" r="4"/>
    <circle cx="500" cy="215" r="5"/>
    <circle cx="545" cy="235" r="6"/>
  </g>
  <polyline points="364,230 460,200 500,215 545,235" fill="none" stroke="#00E5C7" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"/>

  <text x="480" y="410" font-family="ui-sans-serif, Inter, sans-serif" font-size="24" font-weight="600" fill="#F1F5F9" text-anchor="end">Computer Vision for Intelligent Mobile Robotics</text>
</svg>
